<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v-t Graph — Velocity-Time Relationship</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 100vh;
    font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    user-select: none;
  }
  h2 { color: #ccc; font-size: 1rem; font-weight: 500; margin: 10px 0 4px; letter-spacing: 1px; }
  canvas { border-radius: 6px; background: #fdfdfd; box-shadow: 0 2px 14px rgba(0,0,0,0.35); cursor: crosshair; }
  .legend { display: flex; gap: 24px; margin: 8px 0 4px; font-size: 0.78rem; color: #999; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .swatch { display: inline-block; width: 14px; height: 10px; border-radius: 2px; }
  .swatch.area  { background: rgba(66,133,244,0.22); border: 1px solid rgba(66,133,244,0.5); }
  .swatch.slope { background: transparent; border-bottom: 2px dashed #e63946; width: 20px; height: 0; }
  #tooltip {
    position: absolute; display: none; pointer-events: none;
    background: rgba(0,0,0,0.78); color: #fff; padding: 5px 10px;
    border-radius: 6px; font-size: 0.8rem; white-space: nowrap;
    font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  }
  .info-row { color: #888; font-size: 0.75rem; margin-top: 2px; }
</style>
</head>
<body>

<h2>v-t Graph — Velocity-Time Relationship</h2>
<canvas id="vtCanvas" width="560" height="380"></canvas>
<div class="legend">
  <span><span class="swatch area"></span> Area under curve = Displacement</span>
  <span><span class="swatch slope"></span> Dashed red = Slope (instantaneous acceleration)</span>
</div>
<div class="info-row" id="info">Waiting for data…</div>
<div id="tooltip"></div>

<script>
// ──────────────────────────────────────────────
//  1. CANVAS & LAYOUT
// ──────────────────────────────────────────────
const canvas = document.getElementById('vtCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PAD = { top: 28, right: 44, bottom: 48, left: 58 };
const PW = W - PAD.left - PAD.right;
const PH = H - PAD.top - PAD.bottom;

// ──────────────────────────────────────────────
//  2. DATA STORE
// ──────────────────────────────────────────────
let vtData   = [];          // [{t, v}]
let curAccel = 0;          // current acceleration (for slope annotation)
let totalDisplacement = 0; // from main window's physics integration
let tMin = 0, tMax = 10;
let vMax = 5;

// ──────────────────────────────────────────────
//  3. COORDINATE HELPERS
// ──────────────────────────────────────────────
function tx(tVal) { return PAD.left + (tVal - tMin) / (tMax - tMin) * PW; }
function ty(vVal) { return PAD.top + PH - (vVal / vMax) * PH; }

// ──────────────────────────────────────────────
//  4. FIND NEAREST DATA POINT (hover)
// ──────────────────────────────────────────────
function nearestPoint(mx, my) {
  let best = null, bestDist = Infinity;
  vtData.forEach((d, i) => {
    const x = tx(d.t), y = ty(d.v);
    const dist = (mx - x) ** 2 + (my - y) ** 2;
    if (dist < bestDist) { bestDist = dist; best = { ...d, i, x, y }; }
  });
  return best && bestDist < 300 ? best : null;
}

// ──────────────────────────────────────────────
//  5. TRAPEZOIDAL AREA (for self‑computed displacement)
// ──────────────────────────────────────────────
function computeArea() {
  let area = 0;
  for (let i = 1; i < vtData.length; i++)
    area += (vtData[i - 1].v + vtData[i].v) / 2 * (vtData[i].t - vtData[i - 1].t);
  return area;
}

// ──────────────────────────────────────────────
//  6. DRAW
// ──────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // ── Auto‑scale ──
  if (vtData.length > 0) {
    tMax = Math.max(vtData[vtData.length - 1].t + 1, 8);
    tMin = 0;
    vMax = Math.max(2, ...vtData.map(d => d.v)) * 1.2;
  }

  // ── Grid ──
  const tNice = niceStep(tMax - tMin, 5);
  const vNice = niceStep(vMax, 5);
  ctx.strokeStyle = '#ececec'; ctx.lineWidth = 0.5;
  for (let ti = 0; ti <= tMax + tNice; ti += tNice) {
    if (ti < tMin) continue;
    ctx.beginPath(); ctx.moveTo(tx(ti), PAD.top); ctx.lineTo(tx(ti), PAD.top + PH); ctx.stroke();
  }
  for (let vi = 0; vi <= vMax + vNice; vi += vNice) {
    ctx.beginPath(); ctx.moveTo(PAD.left, ty(vi)); ctx.lineTo(PAD.left + PW, ty(vi)); ctx.stroke();
  }

  // ── Axes ──
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top); ctx.lineTo(PAD.left, PAD.top + PH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top + PH); ctx.lineTo(PAD.left + PW, PAD.top + PH); ctx.stroke();
  // arrowheads
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top - 7); ctx.lineTo(PAD.left - 5, PAD.top + 2); ctx.lineTo(PAD.left + 5, PAD.top + 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(PAD.left + PW + 7, PAD.top + PH); ctx.lineTo(PAD.left + PW - 3, PAD.top + PH - 5); ctx.lineTo(PAD.left + PW - 3, PAD.top + PH + 5); ctx.fill();

  // ── Tick labels ──
  ctx.fillStyle = '#666'; ctx.font = '10px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  for (let ti = 0; ti <= tMax + tNice; ti += tNice)
    if (ti >= tMin) ctx.fillText(ti, tx(ti), PAD.top + PH + 16);
  ctx.textAlign = 'right';
  for (let vi = 0; vi <= vMax + vNice; vi += vNice)
    ctx.fillText(vi % 1 === 0 ? vi : vi.toFixed(1), PAD.left - 7, ty(vi) + 4);

  // ── Axis titles ──
  ctx.fillStyle = '#333'; ctx.font = '12px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('t / s', W / 2, H - 4);
  ctx.save();
  ctx.translate(12, PAD.top + PH / 2); ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center'; ctx.fillText('v / (m·s⁻¹)', 0, 0);
  ctx.restore();

  if (vtData.length < 2) {
    ctx.fillStyle = '#999'; ctx.font = '15px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('Waiting for data…', W / 2, PAD.top + PH / 2);
    return;
  }

  // ── Area fill ──
  ctx.beginPath();
  ctx.moveTo(tx(vtData[0].t), PAD.top + PH);
  for (let i = 0; i < vtData.length; i++)
    ctx.lineTo(tx(vtData[i].t), ty(Math.max(vtData[i].v, 0)));
  ctx.lineTo(tx(vtData[vtData.length - 1].t), PAD.top + PH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(66, 133, 244, 0.18)';
  ctx.fill();

  // ── v‑t Curve ──
  ctx.strokeStyle = '#1a56db'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < vtData.length; i++) {
    const x = tx(vtData[i].t), y = ty(vtData[i].v);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // ── Data dots (sparse) ──
  const dotStep = Math.max(1, Math.floor(vtData.length / 70));
  ctx.fillStyle = '#1a56db';
  for (let i = 0; i < vtData.length; i += dotStep) {
    ctx.beginPath(); ctx.arc(tx(vtData[i].t), ty(vtData[i].v), 2.2, 0, Math.PI * 2); ctx.fill();
  }

  // ── Current point highlight ──
  const last = vtData[vtData.length - 1];
  const lx = tx(last.t), ly = ty(last.v);
  ctx.fillStyle = '#e63946';
  ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // ── Slope annotation ──
  if (Math.abs(curAccel) > 0.005 && vMax > 0) {
    const dtSpan = (tMax - tMin) * 0.06;
    const dtPx = dtSpan / (tMax - tMin) * PW;
    const dv_Px = -(curAccel * dtSpan) / vMax * PH;
    const len = Math.sqrt(dtPx * dtPx + dv_Px * dv_Px);
    if (len > 12) {
      const sc = 55 / len;
      const dx = dtPx * sc, dy = dv_Px * sc;
      ctx.strokeStyle = '#e63946'; ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      ctx.beginPath(); ctx.moveTo(lx - dx, ly - dy); ctx.lineTo(lx + dx, ly + dy); ctx.stroke();
      ctx.setLineDash([]);

      const labelX = Math.min(lx + dx + 8, W - 125);
      const labelY = Math.max(ly + dy - 8, 16);
      ctx.fillStyle = '#e63946';
      ctx.font = 'bold 11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`k = ${curAccel.toFixed(2)} m/s²`, labelX, labelY);
    }
  }

  // ── Area (displacement) label ──
  const area = computeArea();
  ctx.fillStyle = 'rgba(26, 86, 219, 0.85)';
  ctx.font = 'bold 12px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Area = Displacement = ${totalDisplacement.toFixed(1)} m (Trapezoidal: ${area.toFixed(1)} m)`, PAD.left + 8, PAD.top + PH - 10);
}

// ──────────────────────────────────────────────
//  7. NICE STEP GENERATOR
// ──────────────────────────────────────────────
function niceStep(range, targetTicks) {
  const raw = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const residual = raw / mag;
  const nice = residual <= 1.5 ? 1 : residual <= 3 ? 2 : residual <= 7 ? 5 : 10;
  return nice * mag;
}

// ──────────────────────────────────────────────
//  8. HOVER TOOLTIP
// ──────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const pt = nearestPoint(mx, my);

  if (pt) {
    tooltip.style.display = 'block';
    tooltip.style.left   = (e.clientX + 18) + 'px';
    tooltip.style.top    = (e.clientY - 38) + 'px';
    tooltip.textContent  = `t = ${pt.t.toFixed(2)} s  |  v = ${pt.v.toFixed(2)} m/s`;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// ──────────────────────────────────────────────
//  9. MESSAGE HANDLER (postMessage from main window)
// ──────────────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'update') return;
  vtData             = e.data.vtData || [];
  curAccel           = e.data.currentAccel || 0;
  totalDisplacement  = e.data.totalDisplacement || 0;
  draw();
  document.getElementById('info').textContent =
    `Data points: ${vtData.length}  |  Current acceleration: ${curAccel.toFixed(2)} m/s²`;
});

// ──────────────────────────────────────────────
// 10. SIGNAL READY TO MAIN WINDOW
// ──────────────────────────────────────────────
if (window.opener) {
  window.opener.postMessage({ type: 'chartReady' }, '*');
}

// Initial draw
draw();
</script>
</body>
</html>
